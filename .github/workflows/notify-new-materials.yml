name: 2 - Уведомить о новых материалах

on:
  push:
    paths:
      - 'data/lessons/lesson-*.json'
      - 'data/grammar/grammar-*.json'
  workflow_dispatch:
    inputs:
      material_path:
        description: 'Путь к JSON, например data/lessons/lesson-1.json'
        required: true
        type: string

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      INPUT_MATERIAL_PATH: ${{ inputs.material_path }}
      GITHUB_EVENT_NAME_VALUE: ${{ github.event_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Подготовить уведомления
        run: node scripts/prepare-notification.mjs > notifications.json

      - name: Показать подготовленные материалы
        run: cat notifications.json

      - name: Отправить уведомления
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_PROJECT_ID" || (echo "Не задана переменная SUPABASE_PROJECT_ID" && exit 1)
          test -n "$NOTIFY_WEBHOOK_SECRET" || (echo "Не задан NOTIFY_WEBHOOK_SECRET" && exit 1)
          endpoint="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/notify-telegram"
          count=$(jq 'length' notifications.json)
          if [ "$count" -eq 0 ]; then
            echo "Нет новых опубликованных материалов для уведомления."
            exit 0
          fi
          jq -c '.[]' notifications.json | while read -r payload; do
            echo "Отправляется: $(echo "$payload" | jq -r '.materialId')"
            curl --fail-with-body --silent --show-error \
              -X POST "$endpoint" \
              -H 'content-type: application/json' \
              -H "x-notify-secret: $NOTIFY_WEBHOOK_SECRET" \
              --data "$payload"
            echo
          done
