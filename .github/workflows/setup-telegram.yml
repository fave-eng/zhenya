name: 1 - Настройка Telegram

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Проверить настройки
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Не задан SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Не задана переменная SUPABASE_PROJECT_ID" && exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "Не задан TELEGRAM_BOT_TOKEN" && exit 1)
          test -n "$NOTIFY_WEBHOOK_SECRET" || (echo "Не задан NOTIFY_WEBHOOK_SECRET" && exit 1)

      - name: Сохранить секреты Edge Function
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_ID" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            NOTIFY_WEBHOOK_SECRET="$NOTIFY_WEBHOOK_SECRET" \
            SITE_BASE_URL="$SITE_BASE_URL"

      - name: Развернуть notify-telegram
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy notify-telegram \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt

      - name: Готово
        run: echo "Функция notify-telegram версии homework-reports-v1 развёрнута."
